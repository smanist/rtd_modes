# A-Dev configuration
# Repo and base_branch were inferred from local git when possible.
# Verifier commands run inside the issue worktree and are trusted local config.
repo: smanist/rtd_modes
base_branch: main
paths:
  worktree_root: .a-dev/worktrees
  run_root: .a-dev/runs
  log_root: .a-dev/logs
  runtime_root: .a-dev/runtime
scheduler:
  interval_minutes: 30
issue_selection:
  ready_label: ai-ready
  resume_label: ai-resume
  working_label: ai-working
  failed_label: ai-failed
  pr_opened_label: ai-pr-opened
  parent_label: ai-parent
  child_label: ai-child
  parent_done_label: ai-parent-done
  blocked_labels:
  - blocked
  - needs-human
  respect_issue_dependencies: true
  allow_stacked_prs: false
  max_stack_depth: 3
  max_issues_per_run: 1
  max_parent_children_per_run: 3
  selection_order: oldest_updated
git:
  branch_prefix: ai/issue-
  keep_worktree_on_success: false
  keep_worktree_on_failure: true
  commit_message_template: 'Fix issue #{number}: {title}'
  allow_dirty_base: false
  remove_ready_on_pr: false
agent:
  backend: codex
  command: codex exec --full-auto
  model: gpt-5.4
  reasoning: high
  timeout_minutes: 30
  max_repair_attempts: 1
review:
  enabled: true
  command: codex exec --sandbox read-only
  max_iterations: 3
  fix_priorities:
  - P0
  - P1
verify:
  commands:
  - ruff check .
  - ruff format --check .
  - pyright
  - pytest
  run_all_commands: true
diff_policy:
  max_changed_files: 30
  max_diff_lines: 2000
  reject_paths:
  - .env
  - .secrets
  - '**/*.pem'
  - '**/*.key'
  allow_lockfile_changes: false
pr:
  draft: true
  title_template: 'Fix #{number}: {title}'
  body_template: 'Closes #{number}


    ## Summary

    This PR was generated by A-Dev.


    ## Verification

    {verification_summary}


    ## Changed files

    {changed_files}


    ## Agent notes

    {agent_notes}

    '
